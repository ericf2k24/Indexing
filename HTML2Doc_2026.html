<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML2Doc_07</title>
    <link rel="manifest" href="manifesthd.json">

    <script>
      /* how to 
      
      
      -this will downoad an html file
      -upload file to gdrive or open with google docs or microsoft word
      -need to save file as .docx
      
      */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('swhd.js')
            .then(reg => console.log('Service Worker registered!'))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* min-height: 100vh; */
        }
        .converter-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #2b579a; /* Word Blue */
            font-family: 'Segoe UI', sans-serif;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .file-input-wrapper {
            margin: 20px 0;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            background: #f8f9fa;
            border: 1px dashed #cccccc;
            border-radius: 4px;
            cursor: pointer;
            box-sizing: border-box;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #2b579a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover {
            background-color: #1e3d6b;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #previewArea {
            margin-top: 25px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            background: #fafafa;
            border-radius: 4px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            font-size: 13px;
        }
        .status-msg {
            font-size: 14px;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="converter-container">
    <h2>HTML to Word 7</h2>
    <p style="font-size: 13px; color: #666;">Convert HTML to Word.</p>
    
    <div class="file-input-wrapper">
        <label style="display:block; font-weight:bold; margin-bottom:8px; font-size:14px;">Select HTML File:</label>
        <input type="file" id="htmlFile" accept=".html,.htm" onchange="handleFileSelect(event)">
    </div>

    <label style="display:block; font-weight:bold; margin-bottom:8px; font-size:14px;">Output Filename:</label>
    <input type="text" id="fileNameInput" placeholder="Enter output filename" value="DocName">

    <button id="convertBtn" onclick="convertToWord()" disabled>Convert & Download True Docx</button>

    <div id="status" class="status-msg"></div>
    
    <div id="previewArea">
        <strong style="display:block; margin-bottom: 5px; color:#555;">Content Preview:</strong>
        <div id="previewContent"></div>
    </div>
</div>

<script>
    let uploadedHtmlContent = "";

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedHtmlContent = e.target.result;
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(uploadedHtmlContent, 'text/html');
            const bodyContent = doc.body ? doc.body.innerHTML : uploadedHtmlContent;

            document.getElementById('previewContent').innerHTML = bodyContent;
            document.getElementById('previewArea').style.display = 'block';
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('status').innerText = "File loaded successfully! Ready to convert.";
            document.getElementById('status').style.color = "green";
            
/*             if (doc.title) {
                document.getElementById('fileNameInput').value = doc.title.replace(/[^a-zA-Z0-9-_ ]/g, '_');
            } else {
                document.getElementById('fileNameInput').value = file.name.replace(/\.[^/.]+$/, "");
            } */
        };
        reader.readAsText(file);
    }

    async function convertToWord() {
        if (!uploadedHtmlContent) return;

        const btn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerText = "Assembling genuine OpenXML binary structure...";
        status.style.color = "#2b579a";

        try {
            const parser = new DOMParser();
            const doc = parser.parseFromString(uploadedHtmlContent, 'text/html');
            
            const elements = Array.from(doc.querySelectorAll('p, h1, h2, h3, div, li'));
            let documentBodyXml = "";

            if (elements.length === 0) {
                const cleanText = doc.body ? doc.body.innerText : uploadedHtmlContent;
                documentBodyXml += `<w:p><w:r><w:t>${escapeXml(cleanText)}</w:t></w:r></w:p>`;
            } else {
                elements.forEach(el => {
                    const blockText = el.innerText.trim();
                    if (!blockText) return;

                    const styleAttr = el.getAttribute('style') || '';
                    const inlineStyleClean = styleAttr.replace(/\s+/g, '').toLowerCase();

                    let isBold = el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' || !!el.querySelector('b, strong');
                    let isUnderline = !!el.querySelector('u, ins') || inlineStyleClean.includes('text-decoration:underline');
                    let size = el.tagName === 'H1' ? '32' : el.tagName === 'H2' ? '28' : '22'; // 16pt, 14pt, 11pt

                    // --- INDENTATION PARSING LAYER ---
                    let indentValue = 0; // Measured in twips (1440 twips = 1 inch)
                    if (el.classList.contains('indent-1') || inlineStyleClean.includes('margin-left:3pt')) {
                        indentValue = 720;  
                    } else if (el.classList.contains('indent-2') || inlineStyleClean.includes('margin-left:6pt')) {
                        indentValue = 1440; 
                    } else if (el.classList.contains('indent-3') || inlineStyleClean.includes('margin-left:9pt')) {
                        indentValue = 2160; 
                    } else if (inlineStyleClean.includes('margin-left:')) {
                        const match = styleAttr.match(/margin-left:\s*([0-9.]+)(pt|px|in|em)/i);
                        if (match) {
                            const val = parseFloat(match[1]);
                            const unit = match[2].toLowerCase();
                            if (unit === 'in') indentValue = Math.round(val * 1440);
                            else if (unit === 'pt') indentValue = Math.round(val * 20);
                            else if (unit === 'px') indentValue = Math.round(val * 15);
                        }
                    }
                    let indentXml = indentValue > 0 ? `<w:ind w:left="${indentValue}"/>` : '';

                    // --- NEW: LINE SPACING PARSING LAYER ---
                    let lineSpacingVal = "240";  // Default: Single spacing (240 twips)
                    let lineRuleVal = "auto";    // Default rule

                    if (inlineStyleClean.includes('line-height:')) {
                        const lineMatch = styleAttr.match(/line-height:\s*([0-9.]+)(px|pt|em|%)?/i);
                        if (lineMatch) {
                            const val = parseFloat(lineMatch[1]);
                            const unit = lineMatch[2] ? lineMatch[2].toLowerCase() : '';

                            if (!unit) { 
                                // It's a multiplier (e.g., line-height: 1.5 or 2)
                                lineSpacingVal = Math.round(val * 240).toString();
                                lineRuleVal = "auto";
                            } else if (unit === 'em') {
                                // em behaves like a multiplier
                                lineSpacingVal = Math.round(val * 240).toString();
                                lineRuleVal = "auto";
                            } else if (unit === '%') {
                                // Percentage (e.g., 150%)
                                lineSpacingVal = Math.round((val / 100) * 240).toString();
                                lineRuleVal = "auto";
                            } else if (unit === 'pt') {
                                // Points (1pt = 20 twips)
                                lineSpacingVal = Math.round(val * 20).toString();
                                lineRuleVal = "exact";
                            } else if (unit === 'px') {
                                // Pixels (approx 1px = 15 twips)
                                lineSpacingVal = Math.round(val * 15).toString();
                                lineRuleVal = "exact";
                            }
                        }
                    }

                    // Check for subject-header to apply space before
                    let spaceBefore = el.classList.contains('subject-header') ? '240' : '0';

                    // Start paragraph block
                    documentBodyXml += `<w:p>
                        <w:pPr>
                            <w:spacing w:before="${spaceBefore}" w:after="20" w:line="${lineSpacingVal}" w:lineRule="${lineRuleVal}"/>
                            ${indentXml}
                            <w:rPr>
                                <w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/>
                                <w:sz w:val="${size}"/>
                            </w:rPr>
                        </w:pPr>`;

                    // --- PER-WORD PROCESSING LAYER ---
                    // Helper logic using DOM traversal to isolate words and catch wrapping italic tags
                    const childNodes = Array.from(el.childNodes);
                    
                    childNodes.forEach(node => {
                        let nodeText = node.textContent;
                        if (!nodeText) return;

                        // Check if this specific node snippet is wrapped inside/is an italic container
                        let nodeIsItalic = false;
                        if (node.nodeType === Node.ELEMENT_NODE) {
                            nodeIsItalic = node.tagName === 'I' || node.tagName === 'EM' || (node.getAttribute('style') || '').toLowerCase().includes('font-style:italic');
                        } else if (node.nodeType === Node.TEXT_NODE && node.parentNode) {
                            let parent = node.parentNode;
                            nodeIsItalic = parent.tagName === 'I' || parent.tagName === 'EM' || (parent.getAttribute('style') || '').toLowerCase().includes('font-style:italic');
                        }

                        // Split by spaces but preserve them as separate tokens so formatting bounds map tightly to words
                        const tokens = nodeText.split(/(\s+)/);

                        tokens.forEach(token => {
                            if (!token) return;
                            
                            // If the token consists purely of whitespace, don't flag it as italicized/styled run content 
                            let isWhitespace = /^\s+$/.test(token);
                            let useItalic = !isWhitespace && nodeIsItalic;

                            documentBodyXml += `<w:r>
                                <w:rPr>
                                    <w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/>
                                    ${isBold ? '<w:b/>' : ''}
                                    ${useItalic ? '<w:i/>' : ''}
                                    ${isUnderline ? '<w:u w:val="single"/>' : ''}
                                    <w:sz w:val="${size}"/>
                                </w:rPr>
                                <w:t xml:space="preserve">${escapeXml(token)}</w:t>
                            </w:r>`;
                        });
                    });

                    documentBodyXml += `</w:p>`;
                });
            }

            const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`;
            const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;
            const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${documentBodyXml}<w:sectPr><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr></w:body></w:document>`;

            const packer = new SimpleZipPacker();
            packer.addFile("[Content_Types].xml", contentTypesXml);
            packer.addFile("_rels/.rels", relsXml);
            packer.addFile("word/document.xml", documentXml);

            const blob = packer.generateBlob();

            let filename = document.getElementById("fileNameInput").value.trim() || "Converted_Document";
            filename = filename.replace(/[^a-zA-Z0-9-_ ]/g, '_');
            if (!filename.toLowerCase().endsWith('.docx')) {
                filename += '.docx';
            }

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 100);

            status.innerText = "Success! Genuine .docx document exported completely offline.";
            status.style.color = "green";

        } catch (err) {
            alert("Processing Failure: " + err.message);
            status.innerText = "Conversion execution failed.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }

    function escapeXml(unsafe) {
        return unsafe.replace(/[<>&'"]/g, function (c) {
            switch (c) {
                case '<': return '&lt;';
                case '>': return '&gt;';
                case '&': return '&amp;';
                case '\'': return '&apos;';
                case '"': return '&quot;';
            }
        });
    }

    function SimpleZipPacker() {
        this.files = [];
        this.addFile = function(name, content) {
            const encoder = new TextEncoder();
            const uint8Data = encoder.encode(content);
            this.files.push({ name: name, data: uint8Data });
        };
        this.generateBlob = function() {
            let bufferParts = [];
            let centralDirectoryParts = [];
            let currentOffset = 0;
            const crc32Table = [];
            for (let i = 0; i < 256; i++) {
                let c = i;
                for (let j = 0; j < 8; j++) {
                    c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                }
                crc32Table[i] = c;
            }
            function getCrc32(data) {
                let crc = 0 ^ (-1);
                for (let i = 0; i < data.length; i++) {
                    crc = (crc >>> 8) ^ crc32Table[(crc ^ data[i]) & 0xFF];
                }
                return (crc ^ (-1)) >>> 0;
            }
            this.files.forEach(file => {
                const nameEncoder = new TextEncoder();
                const nameBytes = nameEncoder.encode(file.name);
                const crc = getCrc32(file.data);
                const size = file.data.length;
                const localHeader = new ArrayBuffer(30 + nameBytes.length);
                const view = new DataView(localHeader);
                view.setUint32(0, 0x04034b50, true);
                view.setUint16(4, 10, true);
                view.setUint16(6, 0, true);
                view.setUint16(8, 0, true);
                view.setUint16(10, 0x3A00, true);
                view.setUint16(12, 0x5461, true);
                view.setUint32(14, crc, true);
                view.setUint32(18, size, true);
                view.setUint32(22, size, true);
                view.setUint16(26, nameBytes.length, true);
                view.setUint16(28, 0, true);
                new Uint8Array(localHeader, 30).set(nameBytes);
                bufferParts.push(new Uint8Array(localHeader));
                bufferParts.push(file.data);
                const cdHeader = new ArrayBuffer(46 + nameBytes.length);
                const cdView = new DataView(cdHeader);
                cdView.setUint32(0, 0x02014b50, true);
                cdView.setUint16(4, 20, true);
                cdView.setUint16(6, 10, true);
                cdView.setUint16(8, 0, true);
                cdView.setUint16(10, 0, true);
                cdView.setUint16(12, 0x3A00, true);
                cdView.setUint16(14, 0x5461, true);
                cdView.setUint32(16, crc, true);
                cdView.setUint32(20, size, true);
                cdView.setUint32(24, size, true);
                cdView.setUint16(28, nameBytes.length, true);
                cdView.setUint16(30, 0, true);
                cdView.setUint16(32, 0, true);
                cdView.setUint16(34, 0, true);
                cdView.setUint16(36, 0, true);
                cdView.setUint32(38, 0, true);
                cdView.setUint32(42, currentOffset, true);
                new Uint8Array(cdHeader, 46).set(nameBytes);
                centralDirectoryParts.push(new Uint8Array(cdHeader));
                currentOffset += localHeader.byteLength + size;
            });
            const cdStartOffset = currentOffset;
            let cdSize = 0;
            centralDirectoryParts.forEach(part => {
                bufferParts.push(part);
                cdSize += part.byteLength;
            });
            const eocd = new ArrayBuffer(22);
            const eocdView = new DataView(eocd);
            eocdView.setUint32(0, 0x06054b50, true);
            eocdView.setUint16(4, 0, true);
            eocdView.setUint16(6, 0, true);
            eocdView.setUint16(8, this.files.length, true);
            eocdView.setUint16(10, this.files.length, true);
            eocdView.setUint32(12, cdSize, true);
            eocdView.setUint32(16, cdStartOffset, true);
            eocdView.setUint16(20, 0, true);
            bufferParts.push(new Uint8Array(eocd));
            return new Blob(bufferParts, { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
        };
    }
</script>

</body>
</html>
