<script>
    // Automatically load chosen file contents into the input area
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('inputArea').value = e.target.result;
        };
        reader.readAsText(file);
    });


    function process() {
        const input = document.getElementById('inputArea').value;
        const configRaw = document.getElementById('configArea').value;
        const basePath = document.getElementById('basePath').value;

        // Parse configuration into an object
        const journalMap = {};
        configRaw.split('\n').forEach(line => {
            const parts = line.split(',');
            if (parts.length >= 3) {
                const jCode = parts[0].trim();
                journalMap[jCode] = {
                    fileName: parts[1].trim(),
                    offset: parseInt(parts[2].trim()) || 0
                };
            }
        });

        /**
         * Matches patterns like:
         * J06, p466
         * 3JS, p466-467
         * 1NS, p466, 467
         */
        const regex = /([a-zA-Z0-9]+),\s+p+([\d]+(?:[-,\s]+\d+)*)/g;
        const result = input.replace(regex, (match, jCode, pRaw) => {
            // Get the specific config for this Jxx / 3JS / 1NS
            const config = journalMap[jCode];
            if (!config) return match; // If code not in config, don't hyperlink
            // Extract the first number from the page string
            const printedPage = parseInt(pRaw.split(/[-,\s]+/)[0]);  
            // Calculate actual PDF page using the offset
            // Formula: Actual Page = Printed Page + Offset
            const actualPage = printedPage - config.offset + 1;
            const fullUrl = `${basePath}${config.fileName}#page=${actualPage}`;
            return `<a href="${fullUrl}" target="_blank" style="color: blue; text-decoration: underline;">${match}</a>`;
        });
        document.getElementById('outputArea').value = result;
    }
</script>
